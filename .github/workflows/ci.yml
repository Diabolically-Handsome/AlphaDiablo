# 全流程 CI:引擎构建 + 无头冒烟 + 下地牢/种子分化测试。
# 用免费可分发的共享版 spawn.mpq(恰好覆盖测试所需的地牢 1-2 层),不涉及版权数据。
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos-smoke:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: brew install cmake fmt sdl2 libsodium pkg-config googletest google-benchmark magic_enum

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet numpy gymnasium pybind11 "stable-baselines3>=2.4" torch

      - name: Fetch shareware game data (spawn.mpq)
        run: |
          mkdir -p "$HOME/Library/Application Support/diasurgical/devilution"
          curl -sL -o "$HOME/Library/Application Support/diasurgical/devilution/spawn.mpq" \
            https://github.com/diasurgical/devilutionx-assets/releases/download/v5/spawn.mpq

      - name: Bootstrap engine source (clone-only)
        # 只 clone 钉死版源码 + brew 依赖;引擎编译统一由 build.sh 完成(避免编两遍)。
        # 不加 || true:钉死 SHA 拉取失败必须在这一步红,而不是下一步报"源码缺失"
        run: BOOTSTRAP_CLONE_ONLY=1 ./bootstrap.sh

      - name: Build bridge
        run: PYTHON="$PWD/.venv/bin/python" ./build.sh

      - name: Smoke test (random agent + determinism)
        run: cd tests && ../.venv/bin/python smoke_random_agent.py

      - name: Descend + seed differentiation test
        run: cd tests && ../.venv/bin/python descend_seed_test.py
